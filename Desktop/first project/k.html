<html>
    <head>
        <title>Link color property</title>
        <style>
            p {
                font-size: 40px;
                text-align: center;

            }
            /* unvisited link8 */
            a:link {
                color: red;
            } 
            /*visited link */
            a:visited {
                color: blue;
            }
            a:hover {
                color: orange;
            }
            a:active {
                color:purple;
            }
            body{
                background-image:url("https://images.pexels.com/photos/1496373/pexels-photo-1496373.jpeg?auto=compress&cs=tinysrgb&w=600");
                background-repeat: no-repeat;
                background-size: cover;
                font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            }
    
        </style>
    </head>
    <body>
        <p>
            <a href="#" target="_blank">
                try this link

            </a><br>
            this link will change colours with different states.
        </p>
    </body>
</html>
